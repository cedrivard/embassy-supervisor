name: CI

# Scoped to the published library crate (`embassy-supervisor`). The firmware and
# bootloader are RP2350 binaries (probe/flash tooling, git deps) and are out of
# scope here; they can get their own job later.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The crate's only host target; spelled out so it's reused across jobs.
  HOST: x86_64-unknown-linux-gnu

jobs:
  # Host unit + integration tests. The workspace `.cargo/config.toml` pins the
  # embedded target, so every host command passes `--target $HOST` to override it.
  test:
    name: test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `defmt` is an embedded-logging feature: it needs a `#[global_logger]` to
      # link a binary, so it cannot run in a host test. Its compilation is covered
      # by the `embedded` (build --all-features) and `lint` (clippy --all-features,
      # check-only) jobs; here we run the functional matrix (control + pool) without it.
      - run: cargo test -p embassy-supervisor --target $HOST
      - run: cargo test -p embassy-supervisor --target $HOST --no-default-features

  # `no_std` guard: the crate must still cross-compile for the MCU target (the
  # pinned default) across the feature matrix.
  embedded:
    name: build (thumbv8m, no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p embassy-supervisor
      - run: cargo build -p embassy-supervisor --no-default-features
      - run: cargo build -p embassy-supervisor --all-features

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -p embassy-supervisor -- --check
      - run: cargo clippy -p embassy-supervisor --target $HOST --all-features -- -D warnings

  docs:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc -p embassy-supervisor --target $HOST --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
