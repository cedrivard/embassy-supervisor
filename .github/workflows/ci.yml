name: CI

# Scoped to the published library crate (`embassy-supervisor`). The firmware and
# bootloader are RP2350 binaries (probe/flash tooling, git deps) and are out of
# scope here; they can get their own job later.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The crate's only host target; spelled out so it's reused across jobs.
  HOST: x86_64-unknown-linux-gnu

jobs:
  # Host unit + integration tests. The workspace `.cargo/config.toml` pins the
  # embedded target, so every host command passes `--target $HOST` to override it.
  test:
    name: test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # rust-src changes how rustc renders const-eval panics whose frames land in
          # core (with the source it prints the annotated snippet; without it, a bare
          # `= note:` fallback). The trybuild `.stderr` snapshots for the dependency-
          # cycle cases are blessed with the source available, so CI must match.
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      # `defmt` is an embedded-logging feature: it needs a `#[global_logger]` to
      # link a binary, so it cannot run in a host test. Its compilation is covered
      # by the `embedded` (build --all-features) and `lint` (clippy --all-features,
      # check-only) jobs; here we run the functional matrix (control + pool) without it.
      - run: cargo test -p embassy-supervisor --target $HOST
      - run: cargo test -p embassy-supervisor --target $HOST --no-default-features
      - run: cargo test -p embassy-supervisor --target $HOST --features trace-hooks
      # Charge-splitting (preemption-exact) accounting + the base trace tests again
      # under the extra feature.
      - run: cargo test -p embassy-supervisor --target $HOST --features trace-nested,trace-hooks
      # `supervisor_graph!` UI tests (trybuild): compile-fail cases lock the macro's
      # error contracts (cycle, unknown dep, ...); compile-pass cases run the generated
      # graph. Host-only — trybuild compiles real graphs — so `--target $HOST`.
      - run: cargo test -p embassy-supervisor-macros --target $HOST

  # `no_std` guard: the crate must still cross-compile for the MCU target (the
  # pinned default) across the feature matrix.
  embedded:
    name: build (thumbv8m, no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p embassy-supervisor
      - run: cargo build -p embassy-supervisor --no-default-features
      - run: cargo build -p embassy-supervisor --features trace
      - run: cargo build -p embassy-supervisor --all-features

  # Canary against embassy's main branch (allow-failure): the executor's trace-hook
  # API is documented as unstable, so this job builds the trace feature with
  # embassy-executor patched to git.
  trace-canary:
    name: trace vs embassy git (canary)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Patch embassy-executor to git main
        run: |
          printf '\n[patch.crates-io]\nembassy-executor = { git = "https://github.com/embassy-rs/embassy" }\n' >> Cargo.toml
          cargo update -p embassy-executor
      - run: cargo build -p embassy-supervisor --target $HOST --features trace-hooks,trace-names

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -p embassy-supervisor -p embassy-supervisor-macros -- --check
      - run: cargo clippy -p embassy-supervisor --target $HOST --all-features -- -D warnings
      # The `supervisor_graph!` proc-macro crate (host-only build).
      - run: cargo clippy -p embassy-supervisor-macros -- -D warnings

  docs:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc -p embassy-supervisor --target $HOST --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
